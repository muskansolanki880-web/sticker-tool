<!DOCTYPE html>
<html>
<head>
  <title>Sticker Maker</title>
  <style>
    body { text-align: center; font-family: Arial; }
    canvas { border: 2px solid black; margin-top: 10px; }
  </style>
</head>
<body>

<h2>🔥 Sticker Maker Tool</h2>

<input type="file" id="upload"><br><br>
<input type="text" id="text" placeholder="Enter text"><br><br>
<button onclick="addText()">Add Text</button>
<button onclick="download()">Download PNG</button>

<br><br>
<canvas id="canvas" width="300" height="300"></canvas>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

document.getElementById("upload").addEventListener("change", function(e) {
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function(event) {
    let img = new Image();
    img.onload = function() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, 300, 300);
    }
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

function addText() {
  let text = document.getElementById("text").value;
  ctx.font = "20px Arial";
  ctx.fillStyle = "red";
  ctx.fillText(text, 50, 150);
}

function download() {
  let link = document.createElement("a");
  link.download = "sticker.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
