<!DOCTYPE html>
<html>
<head>
  <title>🔥 Pro AI Sticker Generator</title>
  <style>
    body {
      text-align:center;
      font-family:Arial;
      background:#111;
      color:white;
    }
    input, select {
      padding:10px;
      margin:10px;
      width:250px;
    }
    button {
      padding:10px 20px;
      background:#ff4d4d;
      color:white;
      border:none;
      cursor:pointer;
    }
    img {
      margin-top:20px;
      max-width:300px;
      border-radius:10px;
    }
    #loader {
      display:none;
      margin-top:20px;
    }
  </style>
</head>
<body>

<h2>🔥 AI Sticker Generator PRO</h2>

<input type="text" id="prompt" placeholder="Enter sticker idea"><br>

<select id="style">
  <option value="cute cartoon sticker, bold outline">Cute</option>
  <option value="anime style sticker, vibrant colors">Anime</option>
  <option value="gym motivational sticker, strong bold text">Gym</option>
</select><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<div id="loader">⏳ Generating...</div>

<br>
<img id="output">

<script>
async function generate() async function generate() {
  let prompt = document.getElementById("prompt").value + ", sticker, bold outline, transparent background";

  document.getElementById("loading").innerText = "⏳ Generating...";

  let res = await fetch("https://api-inference.huggingface.co/models/runwayml/stable-diffusion-v1-5", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + 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,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ inputs: prompt })
  });

  if (!res.ok) {
    alert("Error: " + res.status);
    return;
  }

  let blob = await res.blob();
  let url = URL.createObjectURL(blob);

  document.getElementById("output").src = url;
  document.getElementById("loading").innerText = "";
}
  

function download() {
  let img = document.getElementById("output");
  let a = document.createElement("a");
  a.href = img.src;
  a.download = "sticker.png";
  a.click();
}
</script>

</body>
</html>
