<!DOCTYPE html>
<html>
<head>
  <title>AI Sticker Generator PRO</title>
</head>
<body style="text-align:center; font-family:Arial; background:#111; color:white;">

<h2>🔥 AI Sticker Generator</h2>

<input type="text" id="prompt" placeholder="Enter sticker idea"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<br><br>
<p id="loading"></p>
<img id="output" width="300">

<script>
const API_KEY = "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"; // 

async function generate() {
  let prompt = document.getElementById("prompt").value + ", sticker, bold outline, transparent background";

  document.getElementById("loading").innerText = "⏳ Generating...";

  let res = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ inputs: prompt })
  });

  let blob = await res.blob();
  let url = URL.createObjectURL(blob);

  document.getElementById("output").src = url;
  document.getElementById("loading").innerText = "";
}

function download() {
  let img = document.getElementById("output");
  let a = document.createElement("a");
  a.href = img.src;
  a.download = "sticker.png";
  a.click();
}
</script>

</body>
</html>
