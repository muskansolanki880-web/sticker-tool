<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickerify - Create Aesthetic Stickers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 40px;
            align-items: start;
        }

        .canvas-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeInLeft 1s ease-out;
        }

        .canvas-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 500px;
            background: linear-gradient(45deg, #f0f2f5, #e9ecef);
            border-radius: 20px;
            border: 4px dashed #dee2e6;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .canvas-container:hover {
            border-color: #667eea;
            transform: scale(1.02);
        }

        #stickerCanvas {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: grab;
            max-width: 100%;
            max-height: 100%;
        }

        #stickerCanvas:active {
            cursor: grabbing;
        }

        .controls-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            height: fit-content;
            animation: fadeInRight 1s ease-out;
        }

        .control-group {
            margin-bottom: 30px;
        }

        .control-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .color-picker {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .color-picker:hover {
            transform: scale(1.05);
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e9ecef;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .text-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .text-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
        }

        .preview-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            text-align: center;
        }

        .preview-sticker {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin: 0 auto 15px;
            border: 3px solid white;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .header h1 {
                font-size: 2.5rem;
            }
            
            .canvas-section, .controls-section {
                padding: 25px;
            }
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) {
            top: 20%;
            left: 10%;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            top: 60%;
            right: 15%;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
            100% { transform: translateY(0px) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-sticker-mule"></i> Stickerify</h1>
            <p>Create beautiful, aesthetic stickers in seconds</p>
        </div>

        <div class="main-content">
            <div class="canvas-section">
                <div class="canvas-container">
                    <canvas id="stickerCanvas" width="400" height="400"></canvas>
                </div>
                <div style="text-align: center; color: #666; font-style: italic;">
                    Drag to rotate • Click to add text • Double-click to clear
                </div>
            </div>

            <div class="controls-section">
                <div class="control-group">
                    <label>Sticker Text</label>
                    <input type="text" class="text-input" id="stickerText" placeholder="Type your message..." maxlength="20">
                </div>

                <div class="control-group">
                    <label>Text Color</label>
                    <input type="color" class="color-picker" id="textColor" value="#ffffff">
                </div>

                <div class="control-group">
                    <label>Background Color</label>
                    <input type="color" class="color-picker" id="bgColor" value="#667eea">
                </div>

                <div class="control-group">
                    <label>Text Size</label>
                    <input type="range" id="fontSize" min="20" max="80" value="50">
                    <span id="fontSizeValue">50px</span>
                </div>

                <div class="control-group">
                    <label>Rotation</label>
                    <input type="range" id="rotation" min="0" max="360" value="0">
                    <span id="rotationValue">0°</span>
                </div>

                <button class="btn btn-primary" onclick="updateSticker()">
                    <i class="fas fa-magic"></i> Generate Sticker
                </button>

                <button class="btn btn-secondary" onclick="downloadSticker()">
                    <i class="fas fa-download"></i> Download PNG
                </button>

                <div class="preview-section">
                    <div id="previewSticker" class="preview-sticker" style="background: #667eea;"></div>
                    <div style="color: #666; font-size: 0.9rem;">Live Preview</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stickerCanvas');
        const ctx = canvas.getContext('2d');
        const preview = document.getElementById('previewSticker');

        let rotation = 0;
        let isDragging = false;
        let lastMouseX = 0;

        // Event Listeners
        document.getElementById('stickerText').addEventListener('input', updateSticker);
        document.getElementById('textColor').addEventListener('input', updateSticker);
        document.getElementById('bgColor').addEventListener('input', updateSticker);
        document.getElementById('fontSize').addEventListener('input', function() {
            document.getElementById('fontSizeValue').textContent = this.value + 'px';
            updateSticker();
        });
        document.getElementById('rotation').addEventListener('input', function() {
            document.getElementById('rotationValue').textContent = this.value + '°';
            updateSticker();
        });

        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', drag);
        canvas.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('dblclick', clearCanvas);

        function updateSticker() {
            const text = document.getElementById('stickerText').value || 'STICKER';
            const textColor = document.getElementById('textColor').value;
            const bgColor = document.getElementById('bgColor').value;
            const fontSize = document.getElementById('fontSize').value;
            const currentRotation = parseInt(document.getElementById('rotation').value);

            // Draw on main canvas
            drawSticker(canvas, ctx, text, textColor, bgColor, fontSize, currentRotation);
            
            // Update preview
            drawStickerPreview(text, textColor, bgColor, fontSize, currentRotation);
        }

        function drawSticker(canvas, ctx, text, textColor, bgColor, fontSize, rotation) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, bgColor);
            gradient.addColorStop(1, adjustBrightness(bgColor, -20));
            
            // Sticker shape with shine
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation * Math.PI / 180);
            
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 20);
            ctx.lineTo(canvas.width - 40, canvas.height / 2);
            ctx.quadraticCurveTo(canvas.width - 20, canvas.height - 20, canvas.width / 2, canvas.height - 30);
            ctx.quadraticCurveTo(20, canvas.height - 20, 40, canvas.height / 2);
            ctx.closePath();
            
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Shine effect
            ctx.save();
            ctx.clip();
            const shine = ctx.createRadialGradient(canvas.width * 0.3, canvas.height * 0.3, 0, canvas.width * 0.3, canvas.height * 0.3, canvas.width * 0.6);
            shine.addColorStop(0, 'rgba(255,255,255,0.4)');
            shine.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shine;
            ctx.fill();
            ctx.restore();
            
            ctx.restore();

            // Text
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold ${fontSize}px Poppins, sans-serif`;
            ctx.fillStyle = textColor;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.fillText(text.toUpperCase(), 0, 0);
            ctx.shadowBlur = 0;
            ctx.restore();

            // Border glow
            ctx.shadowColor = bgColor;
            ctx.shadowBlur = 20;
            ctx.strokeStyle = bgColor;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawStickerPreview(text, textColor, bgColor, fontSize, rotation) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 120;
            tempCanvas.height = 120;
            const tempCtx = tempCanvas.getContext('2d');
            
            drawSticker(tempCanvas, tempCtx, text, textColor, bgColor, fontSize * 0.3, rotation);
            preview.style.backgroundImage = `url(${tempCanvas.toDataURL()})`;
        }

        function adjustBrightness(color, amount) {
            const num = parseInt(color.replace("#", ""), 16);
            const amt = Math.round(2.55 * amount);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
        }

        function startDrag(e) {
            isDragging = true;
            lastMouseX = e.clientX;
        }

        function drag(e) {
            if (!isDragging) return;
            const deltaX = e.clientX - lastMouseX;
            rotation += deltaX * 0.5;
            document.getElementById('rotation').value = rotation % 360;
            document.getElementById('rotationValue').textContent = Math.floor(rotation % 360) + '°';
            lastMouseX = e.clientX;
            updateSticker();
        }

        function stopDrag() {
            isDragging = false;
        }

        function clearCanvas() {
